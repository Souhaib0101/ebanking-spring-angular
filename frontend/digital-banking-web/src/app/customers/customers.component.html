<div class="container mt-3">
  <div class="card">
    <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
      <h5 class="mb-0"><i class="bi bi-people-fill"></i> Customers</h5>
      <button class="btn btn-sm btn-success" routerLink="/new-customer">
        <i class="bi bi-person-plus-fill"></i> New Customer
      </button>
    </div>
    <div class="card-body">
      <form [formGroup]="searchFormGroup" (ngSubmit)="handleSearchCustomers()">
        <div class="input-group mb-3">
          <input type="text" class="form-control" formControlName="keyword" placeholder="Search customer...">
          <button class="btn btn-dark" type="submit">
            <i class="bi bi-search"></i> Search
          </button>
        </div>
      </form>

      <table class="table table-striped table-hover">
        <thead class="table-dark">
        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>Email</th>
          <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <ng-container *ngIf="customers | async as listCustomers; else errTemplate">
          <tr *ngFor="let c of listCustomers">
            <td>{{c.id}}</td>
            <td>{{c.name}}</td>
            <td>{{c.email}}</td>
            <td>
              <button class="btn btn-sm btn-info me-2" (click)="handleCustomerAccounts(c)">
                <i class="bi bi-eye-fill"></i> Accounts
              </button>
              <button class="btn btn-sm btn-danger" (click)="handleDeleteCustomer(c)">
                <i class="bi bi-trash"></i> Delete
              </button>
            </td>
          </tr>
        </ng-container>
        <ng-template #errTemplate>
          <tr><td colspan="4" class="text-center text-danger">Error loading customers</td></tr>
        </ng-template>
        </tbody>
      </table>
    </div>
  </div>
</div>
