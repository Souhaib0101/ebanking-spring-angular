<div class="container mt-4">
  <div class="card shadow">
    <div class="card-header bg-dark text-white">
      <h5><i class="bi bi-person-plus-fill"></i> New Customer</h5>
    </div>
    <div class="card-body">
      <form [formGroup]="newCustomerFormGroup" (ngSubmit)="handleSaveCustomer()">

        <div class="mb-3">
          <label class="form-label">Name</label>
          <input type="text" class="form-control" formControlName="name" placeholder="Enter name">
          <div *ngIf="newCustomerFormGroup.controls['name'].invalid && newCustomerFormGroup.controls['name'].touched"
               class="text-danger small">
            Name must be at least 4 characters.
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" class="form-control" formControlName="email" placeholder="Enter email">
          <div *ngIf="newCustomerFormGroup.controls['email'].invalid && newCustomerFormGroup.controls['email'].touched"
               class="text-danger small">
            Please enter a valid email address.
          </div>
        </div>

        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-success" [disabled]="newCustomerFormGroup.invalid">
            <i class="bi bi-save"></i> Save
          </button>
          <button type="button" class="btn btn-secondary" routerLink="/customers">
            <i class="bi bi-arrow-left"></i> Cancel
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
